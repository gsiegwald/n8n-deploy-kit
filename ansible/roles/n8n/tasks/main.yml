---
- name: Check if .env already exists
  ansible.builtin.stat:
    path: /opt/n8n/.env
  register: env_stat
  become: true

- name: Generate secrets
  ansible.builtin.set_fact:
    n8n_postgres_password: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
    n8n_encryption_key: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
  when: not env_stat.stat.exists

- name: Deploy .env from template
  ansible.builtin.template:
    src: .env.j2
    dest: /opt/n8n/.env
    owner: ubuntu
    group: ubuntu
    mode: '0600'
  become: true
  when: not env_stat.stat.exists

- name: Start full Docker Compose stack
  ansible.builtin.command:
    cmd: docker compose -f /opt/n8n/docker-compose.yml up -d
  args:
    chdir: /opt/n8n
  become: true
  changed_when: true

- name: Wait for n8n to be ready
  ansible.builtin.command:
    cmd: >
      docker compose -f /opt/n8n/docker-compose.yml exec -T n8n
      node -e "fetch('http://localhost:5678/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
  args:
    chdir: /opt/n8n
  register: n8n_ready
  until: n8n_ready.rc == 0
  retries: 60
  delay: 5
  become: true
  changed_when: false

- name: Deploy final nginx config
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /opt/n8n/nginx.conf
    owner: ubuntu
    group: ubuntu
    mode: '0644'
  become: true

- name: Test nginx configuration
  ansible.builtin.command:
    cmd: docker compose -f /opt/n8n/docker-compose.yml exec -T nginx nginx -t
  args:
    chdir: /opt/n8n
  become: true
  changed_when: false

- name: Restart nginx with final config
  ansible.builtin.command:
    cmd: docker compose -f /opt/n8n/docker-compose.yml up -d --force-recreate nginx
  args:
    chdir: /opt/n8n
  become: true
  changed_when: true
